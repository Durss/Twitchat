services:
  twitchat:
    build:
      context: .
      dockerfile: Dockerfile
    image: twitchat:latest
    container_name: twitchat
    restart: unless-stopped
    ports:
      - "3018:3018"
    volumes:
      - ./data:/opt/twitchat/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3018/api"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
