name: Build and publish Docker image

on:
    push:
        branches: [main, beta]
        tags: ["v*"]
    workflow_dispatch: {}

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }} # Durss/Twitchat -> ghcr.io/durss/twitchat (lowercased by metadata-action)

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write # required to push to GHCR with GITHUB_TOKEN

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract image tags and labels
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=ref,event=branch
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=sha,format=short

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  provenance: false # single-arch deploy: keep the package manifest clean
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

